<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marquee Text</title>
  <style>
    .marquee {
      width: 100%; 
      overflow: hidden; /* Скрываем текст за границами контейнера */
      white-space: nowrap; /* Запрещаем перенос текста */
      box-sizing: border-box;
      position: relative; 
      background: #f4f4f4; 
      border: 1px solid #ddd; 
      padding: 10px 0;
    }

    .marquee .content {
      display: flex;
      animation: marquee 10s linear infinite; /* Анимация */
    }

    .marquee span {
      display: inline-block;
      font-size: 20px;
      color: #333; 
      flex-shrink: 0;
      min-width: 100%; /* Каждый текст занимает ширину контейнера */
      text-align: center;
    }

    @keyframes marquee {
      from {
        transform: translateX(0); /* Начальная позиция */
      }
      to {
        transform: translateX(-100%); /* Конечная позиция */
      }
    }
  </style>
</head>
<body>
  <div class="marquee">
    <div class="content">
      <span>Это пример бесконечной прокрутки текста</span>
      <span>Это пример бесконечной прокрутки текста</span>
    </div>
  </div>
</body>
</html>
